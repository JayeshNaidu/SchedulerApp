<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointments Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <nav class="nav-links">
          <a href="/index.html">Book Appointment</a>
          <a href="/admin.html">View Appointments</a>
        </nav>
        <p class="eyebrow">Admin</p>
        <h1>Appointments</h1>
        <p class="intro">
          This page reads appointments from the backend and shows what has been saved in
          Neon.
        </p>
      </section>

      <section class="panel">
        <div class="panel-header panel-header-row">
          <h2>Saved Appointments</h2>
          <button id="refreshButton" type="button">Refresh</button>
        </div>

        <div id="emptyState" class="empty-state">Loading appointments...</div>

        <div class="table-wrap">
          <table id="appointmentsTable" class="appointments-table" hidden>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Service</th>
                <th>Appointment Time</th>
                <th>Created At</th>
              </tr>
            </thead>
            <tbody id="appointmentsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
